<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>07 Hover-Glitch Effect</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: #f4f8ff;
      background:
        radial-gradient(circle at top left, rgba(255, 69, 124, 0.16), transparent 22%),
        radial-gradient(circle at bottom right, rgba(40, 218, 255, 0.14), transparent 24%),
        linear-gradient(135deg, #060710, #101629 48%, #09111d);
      padding: 48px 24px 64px;
    }
    .wrap { max-width: 1140px; margin: 0 auto; }
    h1 {
      margin: 0 0 10px;
      font-size: clamp(2.2rem, 5vw, 4.4rem);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .intro {
      margin: 0 0 28px;
      max-width: 700px;
      color: #c8d1e9;
      line-height: 1.6;
    }
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 22px;
    }
    .card {
      position: relative;
      overflow: hidden;
      border-radius: 26px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(9, 14, 24, 0.62);
      box-shadow: 0 20px 44px rgba(0, 0, 0, 0.24);
    }
    img {
      display: block;
      width: 100%;
      aspect-ratio: 4 / 5;
      object-fit: cover;
      transition: transform 220ms ease, filter 220ms ease;
    }
    .card::before,
    .card::after {
      content: "";
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 180ms ease;
      pointer-events: none;
    }
    .card::before {
      background: repeating-linear-gradient(180deg, transparent 0 6px, rgba(255, 255, 255, 0.08) 6px 8px);
      mix-blend-mode: screen;
    }
    .card::after {
      background: linear-gradient(90deg, rgba(255, 0, 102, 0.18), transparent 30%, rgba(0, 255, 255, 0.16));
      mix-blend-mode: screen;
    }
    .card:hover img {
      animation: glitch 220ms steps(2) infinite;
      filter: saturate(170%) contrast(150%) hue-rotate(65deg);
    }
    .card:hover::before,
    .card:hover::after { opacity: 1; }
    .label { padding: 16px 18px 20px; color: #d8def0; }
    .label strong { display: block; margin-bottom: 6px; color: #fff; }
    @keyframes glitch {
      0% { transform: translate(0, 0); }
      20% { transform: translate(-4px, 2px); }
      40% { transform: translate(3px, -2px); }
      60% { transform: translate(-2px, -3px) skewX(-2deg); }
      80% { transform: translate(4px, 2px); }
      100% { transform: translate(0, 0); }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Hover Glitch</h1>
    <p class="intro">Hover an image card to add a soft shake, scan lines, and a color shift. The result mimics a mild digital glitch without losing the underlying picture.</p>
    <div class="gallery" id="gallery"></div>
  </div>
  <script>
    const artworks = [
      {
        title: "Signal Portrait",
        text: "Hover to distort the portrait with color noise.",
        svg: "<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 800 1000'><defs><linearGradient id='g' x1='0' x2='1' y1='0' y2='1'><stop stop-color='#0a1636'/><stop offset='1' stop-color='#f54f8c'/></linearGradient></defs><rect width='800' height='1000' fill='url(#g)'/><circle cx='390' cy='310' r='170' fill='#ffe1b2'/><rect x='230' y='460' width='320' height='340' rx='150' fill='#212b4c'/><circle cx='330' cy='290' r='18' fill='#121d35'/><circle cx='450' cy='290' r='18' fill='#121d35'/><path d='M330 380c35 35 95 35 130 0' stroke='#121d35' stroke-width='16' fill='none' stroke-linecap='round'/><path d='M230 205c45-140 315-160 350 80-80-45-210-40-350-80z' fill='#121d35'/></svg>"
      },
      {
        title: "Future City",
        text: "The skyline flickers like a neon display.",
        svg: "<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 800 1000'><rect width='800' height='1000' fill='#0a1022'/><rect y='520' width='800' height='480' fill='#10172f'/><circle cx='630' cy='210' r='120' fill='#ffd46a'/><rect x='110' y='360' width='120' height='360' fill='#3e6dff'/><rect x='250' y='280' width='150' height='440' fill='#60d9ff'/><rect x='430' y='210' width='120' height='510' fill='#ff5c89'/><rect x='575' y='330' width='110' height='390' fill='#77ffcb'/><rect x='160' y='430' width='20' height='220' fill='#c7f2ff'/><rect x='300' y='330' width='20' height='280' fill='#dff8ff'/><rect x='480' y='250' width='20' height='330' fill='#fff6dc'/></svg>"
      },
      {
        title: "Analog Bloom",
        text: "A floral poster turns unstable under the cursor.",
        svg: "<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 800 1000'><defs><radialGradient id='bg'><stop stop-color='#fff3c4'/><stop offset='1' stop-color='#0f1835'/></radialGradient></defs><rect width='800' height='1000' fill='url(#bg)'/><circle cx='400' cy='420' r='95' fill='#ff7a59'/><circle cx='290' cy='360' r='85' fill='#ff4e8c'/><circle cx='510' cy='360' r='85' fill='#66e7ff'/><circle cx='290' cy='490' r='85' fill='#ffd45f'/><circle cx='510' cy='490' r='85' fill='#74ffb5'/><rect x='382' y='500' width='36' height='250' rx='18' fill='#293956'/></svg>"
      }
    ];

    const gallery = document.getElementById("gallery");
    for (const art of artworks) {
      const encoded = `data:image/svg+xml;utf8,${encodeURIComponent(art.svg)}`;
      const card = document.createElement("article");
      card.className = "card";
      card.innerHTML = `<img alt="${art.title}" src="${encoded}"><div class="label"><strong>${art.title}</strong>${art.text}</div>`;
      gallery.appendChild(card);
    }
  </script>
</body>
</html>
