<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>03 Dynamic Background Gradient</title>
  <style>
    :root {
      --spot-x: 50%;
      --spot-y: 50%;
      --color-a: hsl(200 90% 58%);
      --color-b: hsl(330 95% 62%);
      --color-c: hsl(260 100% 70%);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background:
        radial-gradient(circle at var(--spot-x) var(--spot-y), rgba(255, 255, 255, 0.16), transparent 18%),
        radial-gradient(circle at calc(100% - var(--spot-x)) calc(100% - var(--spot-y)), var(--color-b), transparent 40%),
        linear-gradient(135deg, var(--color-a), var(--color-c) 50%, var(--color-b));
      color: #f6f9ff;
      transition: background 120ms linear;
    }
    .panel {
      width: min(760px, 92vw);
      padding: 28px;
      border-radius: 28px;
      background: rgba(7, 10, 20, 0.34);
      border: 1px solid rgba(255, 255, 255, 0.16);
      backdrop-filter: blur(16px);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.25);
    }
    h1 {
      margin: 0 0 10px;
      font-size: clamp(2.4rem, 6vw, 4.8rem);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    p {
      margin: 0 0 12px;
      line-height: 1.6;
      color: #e5ebff;
      max-width: 600px;
    }
    .hint { color: #c8d6ff; font-size: 0.96rem; }
  </style>
</head>
<body>
  <section class="panel">
    <h1>Gradient Follows You</h1>
    <p>Move the pointer toward different corners of the screen. The page background smoothly changes its hue balance and spotlight position based on where the mouse is.</p>
    <p class="hint" id="corner">Pointer focus: center</p>
  </section>
  <script>
    const root = document.documentElement;
    const cornerLabel = document.getElementById("corner");

    function updateGradient(clientX, clientY) {
      const nx = clientX / window.innerWidth;
      const ny = clientY / window.innerHeight;
      root.style.setProperty("--spot-x", `${(nx * 100).toFixed(2)}%`);
      root.style.setProperty("--spot-y", `${(ny * 100).toFixed(2)}%`);
      root.style.setProperty("--color-a", `hsl(${180 + nx * 120} 92% 58%)`);
      root.style.setProperty("--color-b", `hsl(${320 - ny * 140} 95% 62%)`);
      root.style.setProperty("--color-c", `hsl(${230 + (ny - nx) * 80} 96% 68%)`);

      const horizontal = nx < 0.33 ? "left" : nx > 0.66 ? "right" : "center";
      const vertical = ny < 0.33 ? "top" : ny > 0.66 ? "bottom" : "middle";
      cornerLabel.textContent = `Pointer focus: ${vertical} ${horizontal}`;
    }

    window.addEventListener("pointermove", (event) => updateGradient(event.clientX, event.clientY));
    updateGradient(window.innerWidth / 2, window.innerHeight / 2);
  </script>
</body>
</html>
