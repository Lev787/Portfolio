<!DOCTYPE HTML>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <title>Super Mario Bros</title>
  <style>
    body { 
      margin: 0; 
      padding: 0; 
      background: #5c94fc; 
      overflow: hidden; 
      width: 100vw;
      height: 100vh;
      font-family: inherit;
    }
    
    @font-face {
      font-family: "Super Plumber Bros";
      src: url("Fonts/super_plumber_brothers.ttf");
    }

    iframe { 
      position: absolute; 
      border: 0; 
      top: 0; 
      left: 0; 
      transform-origin: top left;
      display: none;
    }

    #main-menu {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #5c94fc;
      background-image: 
        linear-gradient(180deg, transparent 80%, #c84c0c 80%, #c84c0c 100%),
        radial-gradient(circle at 20% 30%, white 5%, transparent 5%),
        radial-gradient(circle at 25% 30%, white 6%, transparent 6%),
        radial-gradient(circle at 30% 30%, white 5%, transparent 5%),
        radial-gradient(circle at 70% 20%, white 4%, transparent 4%),
        radial-gradient(circle at 75% 20%, white 5%, transparent 5%),
        radial-gradient(circle at 80% 20%, white 4%, transparent 4%);
      z-index: 100;
    }

    .title {
      font-family: "Super Plumber Bros", "Courier New", Courier, monospace;
      font-size: 80px;
      color: #ffcccc;
      text-shadow: 4px 4px 0px black, 8px 8px 0px rgba(0,0,0,0.3);
      text-align: center;
      margin-bottom: 60px;
      line-height: 1.1;
    }

    .title span.small {
      font-size: 50px;
      display: block;
      margin-bottom: -15px;
    }

    .menu-buttons {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .btn {
      font-family: "Super Plumber Bros", "Courier New", Courier, monospace;
      background: #d64d00;
      color: #ffcccc;
      border: 4px solid black;
      border-radius: 8px;
      padding: 15px 40px;
      font-size: 30px;
      cursor: pointer;
      box-shadow: 4px 4px 0px rgba(0,0,0,0.3), 4px 4px 0px inset #efb28b, -4px -4px 0px inset rgba(0,0,0,0.5);
      transition: transform 0.1s, box-shadow 0.1s;
    }

    .btn:hover {
      background: #e85a00;
    }

    .btn:active {
      transform: translateY(4px);
      box-shadow: 0px 0px 0px rgba(0,0,0,0.3), 4px 4px 0px inset #efb28b, -4px -4px 0px inset rgba(0,0,0,0.5);
    }

    #settings-modal {
      display: none;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #d64d00;
      border: 4px solid black;
      border-radius: 12px;
      padding: 30px;
      z-index: 200;
      box-shadow: 8px 8px 0px rgba(0,0,0,0.5), 4px 4px 0px inset #efb28b, -4px -4px 0px inset rgba(0,0,0,0.5);
      text-align: center;
      color: #ffcccc;
      font-family: "Courier New", Courier, monospace;
      font-weight: bold;
      font-size: 24px;
    }

    #settings-modal h2 {
      font-family: "Super Plumber Bros", "Courier New", Courier, monospace;
      margin-top: 0;
      font-size: 40px;
      color: #ffcccc;
      text-shadow: 2px 2px 0px black;
    }

    #settings-modal p {
      margin: 15px 0;
      text-shadow: 2px 2px 0px black;
    }
  </style>
</head>
<body onresize="resizeIframe()">
  
  <div id="main-menu">
    <div class="title">
      <span class="small">super</span>
      MARIO BROS.
    </div>
    <div class="menu-buttons">
      <button class="btn" onclick="startGame()">PLAY</button>
      <button class="btn" onclick="openSettings()">SETTINGS</button>
    </div>
  </div>

  <div id="settings-modal">
    <h2>Controls</h2>
    <p>Move: Arrows/WASD</p>
    <p>Fire/Sprint: Shift/CTRL</p>
    <p>Pause/Mute: P/M</p>
    <button class="btn" style="margin-top: 20px; font-size: 20px; padding: 10px 20px;" onclick="closeSettings()">CLOSE</button>
  </div>

  <iframe id="game" src="mario.html"></iframe>
  
  <script>
    function startGame() {
      document.getElementById('main-menu').style.display = 'none';
      const iframe = document.getElementById('game');
      iframe.style.display = 'block';
      
      // Let the iframe know it can start map 1-1
      iframe.contentWindow.postMessage("startGame", "*");
      
      setTimeout(resizeIframe, 50);
    }

    function openSettings() {
      document.getElementById('settings-modal').style.display = 'block';
    }

    function closeSettings() {
      document.getElementById('settings-modal').style.display = 'none';
    }

    function resizeIframe() {
      const iframe = document.getElementById('game');
      if (iframe.style.display === 'none') return;
      
      /* Cut exactly elements as requested: */
      const cutX = 15 * 32;
      const cutY = 10 * 32;
      
      const targetWidth = window.innerWidth - cutX;
      const targetHeight = window.innerHeight - cutY;
      
      if (targetWidth <= 0 || targetHeight <= 0) return;
      
      iframe.style.width = targetWidth + 'px';
      iframe.style.height = targetHeight + 'px';
      
      const scaleX = window.innerWidth / targetWidth;
      const scaleY = window.innerHeight / targetHeight;
      
      iframe.style.transform = `scale(${scaleX}, ${scaleY})`;
    }
  </script>
</body>
</html>
